  if(u.role === 'user') {
    document.getElementById('reg-name').value = u.name;
    document.getElementById('reg-nim').value  = u.nim;
    document.getElementById('reg-prodi').value = u.prodi;
    document.getElementById('reg-email').value = u.email;
  }
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════

function showPage(id, btn) {
  const access = ACCESS_MATRIX[currentUser.role];
  if(!access[id]) { toast('⛔ Akses ditolak untuk peran Anda.'); return; }

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');

  if(id==='register')   { populateEventSelects(); renderRegistrations(); }
  if(id==='absensi')    { populateEventSelects(); renderAbsensiLog(); }
  if(id==='sertifikat') { populateEventSelects(); renderCertLog(); }
  if(id==='rekap')      { populateEventSelects(); renderRekap(); }
  if(id==='manajemen')  { renderUserTable(); renderAccessMatrix(); }
  if(id==='profil')     { loadProfile(); renderMyRegistrations(); }
  if(id==='dashboard')  { renderDashboard(); }
  if(id==='tiketify')   { renderTiketify(); }
  if(id==='game')       { initGamePage(); }
}

function switchTab(btn, tabId) {
  const parent = btn.closest('.tab-row').parentElement;
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// ═══════════════════════════════════════════════════
//  SELECTS
// ═══════════════════════════════════════════════════

function populateEventSelects() {
  const ids = ['reg-event','abs-event','qr-event-sel','cert-event','rekap-filter','abs-filter-event'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    const isFilter = (id==='rekap-filter'||id==='abs-filter-event');
    el.innerHTML = isFilter ? '<option value="">Semua Event</option>' : '<option value="">— Pilih event —</option>';
    EVENTS.forEach(e => {
      const o = document.createElement('option');
      o.value = e.id; o.textContent = e.name;
      el.appendChild(o);
    });
  });
}

// ═══════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════

function renderDashboard() {
  document.getElementById('h-total').innerHTML   = EVENTS.length + ' <span>acara</span>';
  document.getElementById('h-peserta').innerHTML = registrations.length + ' <span>org</span>';
  document.getElementById('h-cert').innerHTML    = certLog.length + ' <span>lembar</span>';

  const isAdmin = currentUser.role !== 'user';

  const grid = document.getElementById('event-grid');
  grid.innerHTML = EVENTS.map(e => {
    const regs = registrations.filter(r=>r.event===e.id).length;
    const pct  = Math.round(regs/e.capacity*100);
    const myReg = currentUser.role==='user' ? registrations.find(r=>r.nim===currentUser.nim&&r.event===e.id) : null;
    return `<div class="event-card">
      <div class="event-card-header" style="background:${e.color}">
        <span class="badge" style="background:rgba(0,0,0,.3);color:#fff;font-size:10px">${e.id}</span>
        ${myReg ? '<span class="badge" style="background:rgba(16,185,129,.8);color:#fff;font-size:10px;margin-left:4px">✓ Terdaftar</span>' : ''}
      </div>
      <div class="event-card-body">
        <div class="event-card-title">${e.name}</div>
        <div class="event-meta">
          <span>📅 ${fmtDate(e.date)}</span>
          <span>⏰ ${e.time}</span>
          <span>📍 ${e.venue}</span>
        </div>
        ${isAdmin ? `<div class="flex items-center gap-8" style="margin-bottom:8px"><div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${pct>80?'var(--danger)':'var(--accent)'}"></div></div><span style="font-size:11px;color:var(--muted)">${regs}/${e.capacity}</span></div>` : ''}
        <div class="flex gap-8">
          <span class="badge badge-blue" style="font-size:10px">${e.prodi}</span>
          ${!myReg ? `<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="quickReg('${e.id}')">Daftar</button>` : `<span class="badge badge-green" style="margin-left:auto">✓ Sudah Daftar</span>`}
        </div>
      </div>
    </div>`;
  }).join('');

  const tbody = document.getElementById('activity-body');
  const data  = currentUser.role==='user'
    ? registrations.filter(r=>r.nim===currentUser.nim)
    : [...registrations].reverse().slice(0,8);
  tbody.innerHTML = data.map(r => {
    const ev = EVENTS.find(e=>e.id===r.event);
    const isHadir = absensiLog.some(a=>a.regId===r.id);
    return `<tr>
      <td><strong>${r.name}</strong></td>
      <td style="color:var(--muted)">${r.nim}</td>
      <td>${ev?ev.name:r.event}</td>
      <td style="color:var(--muted);font-size:12px">${r.date}</td>
      <td><span class="badge ${isHadir?'badge-green':'badge-gold'}">${isHadir?'✓ Hadir':'Terdaftar'}</span></td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="text-center" style="color:var(--muted);padding:24px">Belum ada data</td></tr>';
}

function quickReg(eid) {
  if(!ACCESS_MATRIX[currentUser.role].register) return;
  const btn = [...document.querySelectorAll('.nav-tab')].find(b=>b.getAttribute('onclick')?.includes('register'));
  showPage('register', btn);
  setTimeout(()=>{ document.getElementById('reg-event').value = eid; }, 50);
}

// ═══════════════════════════════════════════════════
//  REGISTRATION
// ═══════════════════════════════════════════════════

function submitRegistration() {
  const evId  = document.getElementById('reg-event').value;
  const name  = document.getElementById('reg-name').value.trim();
  const nim   = document.getElementById('reg-nim').value.trim();
  const prodi = document.getElementById('reg-prodi').value;
  const email = document.getElementById('reg-email').value.trim();
  const wa    = document.getElementById('reg-wa').value.trim();

  if(!evId||!name||!nim||!prodi||!email) return toast('Lengkapi semua kolom wajib!');
  if(registrations.find(r=>r.nim===nim&&r.event===evId)) return toast('NIM sudah terdaftar di event ini!');

  const id = 'R'+String(registrations.length+1).padStart(3,'0');
  registrations.push({ id, name, nim, prodi, email, wa, event:evId, date:today(), status:'confirmed' });

  if(currentUser.role==='user') {
    // don't clear auto-filled fields
    document.getElementById('reg-event').value = '';
  } else {
    ['reg-name','reg-nim','reg-email','reg-wa'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('reg-prodi').value='';
    document.getElementById('reg-event').value='';
  }

  renderDashboard();
  toast(`✓ ${name} berhasil didaftarkan!`);
  if(currentUser.role!=='user') {
    switchTab(document.querySelectorAll('#page-register .tab-btn')[1], 'list-tab');
    renderRegistrations();
  }
}

function renderRegistrations() {
  const q = (document.getElementById('search-reg')||{}).value||'';
  const isAdmin = currentUser.role !== 'user';
  let data = registrations.filter(r => {
    const matchQ = !q || r.name.toLowerCase().includes(q.toLowerCase()) || r.nim.includes(q);
    const matchUser = isAdmin || r.nim === currentUser.nim;
    return matchQ && matchUser;
  });
  const tbody = document.getElementById('reg-body');
  tbody.innerHTML = data.map((r,i) => {
    const ev = EVENTS.find(e=>e.id===r.event);
    return `<tr>
      <td>${i+1}</td>
      <td><strong>${r.name}</strong></td>
      <td style="color:var(--muted)">${r.nim}</td>
      <td>${r.prodi}</td>
      <td>${ev?ev.name:r.event}</td>
      <td style="color:var(--muted);font-size:12px">${r.date}</td>
      <td><span class="badge badge-green">${r.status}</span></td>
      <td>${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="removeReg('${r.id}')">Hapus</button>` : ''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="text-center" style="color:var(--muted);padding:20px">Belum ada data</td></tr>';
}

function removeReg(id) {
  if(!confirm('Hapus pendaftaran ini?')) return;
  registrations = registrations.filter(r=>r.id!==id);
  renderRegistrations(); renderDashboard();
  toast('Pendaftaran dihapus.');
}

// ═══════════════════════════════════════════════════
//  ABSENSI
// ═══════════════════════════════════════════════════

function recordAbsensi() {
  const eid = document.getElementById('abs-event').value;
  const nim = document.getElementById('abs-nim').value.trim();
  if(!eid||!nim) return toast('Pilih event dan masukkan NIM!');
  const reg = registrations.find(r=>r.nim===nim&&r.event===eid);
  if(!reg) return toast('Peserta tidak ditemukan / belum terdaftar!');
  if(absensiLog.find(a=>a.regId===reg.id)) return toast('Peserta sudah tercatat hadir!');
  const id = 'A'+String(absensiLog.length+1).padStart(3,'0');
  absensiLog.push({ id, regId:reg.id, nim, name:reg.name, event:eid, time:nowStr() });
  document.getElementById('abs-nim').value='';
  document.getElementById('abs-peserta-name').textContent = reg.name;
  document.getElementById('abs-peserta-nim').textContent  = reg.nim+' — '+reg.prodi;
  document.getElementById('abs-msg').textContent = `✓ Kehadiran ${reg.name} berhasil dicatat!`;
  document.getElementById('abs-result').style.display='block';
  renderDashboard(); toast(`✓ ${reg.name} hadir!`);
}

function renderAbsensiLog() {
  const filter = (document.getElementById('abs-filter-event')||{}).value||'';
  const data = absensiLog.filter(a=>!filter||a.event===filter);
  const tbody = document.getElementById('abs-log-body');
  tbody.innerHTML = data.map((a,i)=>{
    const ev = EVENTS.find(e=>e.id===a.event);
    return `<tr><td>${i+1}</td><td><strong>${a.name}</strong></td><td style="color:var(--muted)">${a.nim}</td><td>${ev?ev.name:a.event}</td><td style="color:var(--muted);font-size:12px">${a.time}</td><td><span class="badge badge-green">✓ Hadir</span></td></tr>`;
  }).join('')||'<tr><td colspan="6" class="text-center" style="color:var(--muted);padding:20px">Belum ada data</td></tr>';
}

function updateQR() {
  const eid = (document.getElementById('qr-event-sel')||{}).value||'';
  const pat  = document.getElementById('qr-pat');
  if(!pat) return;
  pat.innerHTML='';
  for(let i=0;i<49;i++){
    const c=document.createElement('div'); c.className='qr-cell';
    c.style.background=(i<7&&(i%7===0||i%7===6))||Math.random()>.5?(eid?'var(--navy)':'#ccc'):'white';
    pat.appendChild(c);
  }
}

// ═══════════════════════════════════════════════════
//  SERTIFIKAT
// ═══════════════════════════════════════════════════

function updateCertPreview() {
  const eid = (document.getElementById('cert-event')||{}).value||'';
  const sel = document.getElementById('cert-peserta');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML='<option value="">— Pilih peserta —</option>';
  registrations.filter(r=>!eid||r.event===eid).forEach(r=>{
    const o=document.createElement('option'); o.value=r.id; o.textContent=r.name+' ('+r.nim+')'; sel.appendChild(o);
  });
  sel.value=cur;
  const reg=registrations.find(r=>r.id===sel.value);
  const ev=EVENTS.find(e=>e.id===eid);
  document.getElementById('prev-name').textContent  = reg?reg.name:'Nama Peserta';
  document.getElementById('prev-event').textContent = ev?ev.name:'Nama Acara';
  document.getElementById('prev-role').textContent  = 'sebagai '+(document.getElementById('cert-role').value||'Peserta');
  document.getElementById('prev-date').textContent  = 'Yogyakarta, '+(ev?fmtDate(ev.date):'—');
}

function issueCert() {
  const eid=document.getElementById('cert-event').value;
  const pid=document.getElementById('cert-peserta').value;
  const role=document.getElementById('cert-role').value;
  if(!eid||!pid) return toast('Pilih event dan peserta!');
  const reg=registrations.find(r=>r.id===pid);
  const ev=EVENTS.find(e=>e.id===eid);
  const code='CERT-'+ev.id+'-'+reg.id.slice(1);
  if(certLog.find(c=>c.code===code)) return toast('Sertifikat sudah pernah diterbitkan!');
  certLog.push({id:'C'+String(certLog.length+1).padStart(3,'0'),name:reg.name,event:ev.name,issued:today(),code,role});
  renderCertLog(); renderDashboard(); toast('✓ Sertifikat '+reg.name+' berhasil diterbitkan!');
}

function issueAll() {
  const eid=document.getElementById('cert-event').value;
  if(!eid) return toast('Pilih event terlebih dahulu!');
  const ev=EVENTS.find(e=>e.id===eid); let count=0;
  registrations.filter(r=>r.event===eid).forEach(reg=>{
    const code='CERT-'+ev.id+'-'+reg.id.slice(1);
    if(!certLog.find(c=>c.code===code)){
      certLog.push({id:'C'+String(certLog.length+1).padStart(3,'0'),name:reg.name,event:ev.name,issued:today(),code,role:'Peserta'});
      count++;
    }
  });
  renderCertLog(); renderDashboard(); toast(`✓ ${count} sertifikat baru diterbitkan!`);
}

function renderCertLog() {
  const tbody=document.getElementById('cert-log-body');
  if(!tbody) return;
  tbody.innerHTML=certLog.slice().reverse().map(c=>`<tr>
    <td><strong>${c.name}</strong></td>
    <td style="font-size:12px">${c.event}</td>
    <td style="color:var(--muted);font-size:12px">${c.issued}</td>
    <td><button class="btn btn-gold btn-sm" onclick="toast('Mengunduh ${c.code}…')">⬇</button></td>
  </tr>`).join('')||'<tr><td colspan="4" class="text-center" style="color:var(--muted);padding:20px">Belum ada sertifikat</td></tr>';
}

// ═══════════════════════════════════════════════════
//  REKAP
// ═══════════════════════════════════════════════════

function renderRekap() {
  const filter=(document.getElementById('rekap-filter')||{}).value||'';
  const q=(document.getElementById('rekap-search')||{}).value||'';
  let data=registrations.filter(r=>(!filter||r.event===filter)&&(!q||r.name.toLowerCase().includes(q.toLowerCase())||r.nim.includes(q)));
  const hadirCount=data.filter(r=>absensiLog.some(a=>a.regId===r.id)).length;
  const certCount=data.filter(r=>certLog.some(c=>c.name===r.name)).length;
  document.getElementById('rekap-stats').innerHTML=[
    {val:data.length,lbl:'Total Terdaftar',col:'var(--accent)'},
    {val:hadirCount,lbl:'Hadir',col:'var(--success)'},
    {val:data.length-hadirCount,lbl:'Tidak Hadir',col:'var(--danger)'},
    {val:certCount,lbl:'Sertifikat Terbit',col:'#D97706'},
  ].map(s=>`<div class="stat-card"><div class="stat-card-val" style="color:${s.col}">${s.val}</div><div class="stat-card-lbl">${s.lbl}</div></div>`).join('');
  const events=filter?EVENTS.filter(e=>e.id===filter):EVENTS;
  document.getElementById('rekap-bars').innerHTML=events.map(ev=>{
    const total=registrations.filter(r=>r.event===ev.id).length;
    const hadir=absensiLog.filter(a=>a.event===ev.id).length;
    const pct=total?Math.round(hadir/total*100):0;
    return `<div style="margin-bottom:14px">
      <div class="flex items-center justify-between" style="margin-bottom:4px">
        <span style="font-size:13px;font-weight:500">${ev.name}</span>
        <span style="font-size:12px;color:var(--muted)">${hadir}/${total} (${pct}%)</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  const tbody=document.getElementById('rekap-body');
  tbody.innerHTML=data.map((r,i)=>{
    const ev=EVENTS.find(e=>e.id===r.event);
    const hadir=absensiLog.some(a=>a.regId===r.id);
    const cert=certLog.some(c=>c.name===r.name&&c.event===(ev?ev.name:''));
    return `<tr>
      <td>${i+1}</td><td><strong>${r.name}</strong></td>
      <td style="color:var(--muted)">${r.nim}</td><td>${r.prodi}</td>
      <td style="font-size:12px">${ev?ev.name:r.event}</td>
      <td style="color:var(--muted);font-size:12px">${r.date}</td>
      <td><span class="badge ${hadir?'badge-green':'badge-red'}">${hadir?'✓ Hadir':'✗'}</span></td>
      <td><span class="badge ${cert?'badge-gold':'badge-teal'}">${cert?'✓ Terbit':'—'}</span></td>
    </tr>`;
  }).join('')||'<tr><td colspan="8" class="text-center" style="color:var(--muted);padding:20px">Tidak ada data</td></tr>';
}

// ═══════════════════════════════════════════════════
//  MANAJEMEN USER
// ═══════════════════════════════════════════════════

let editingUserId = null;

function renderUserTable() {
  const tbody = document.getElementById('user-table-body');
  if(!tbody) return;
  tbody.innerHTML = USERS.map(u => {
    const roleColor = u.role==='admin'?'badge-gold':u.role==='panitia'?'badge-blue':'badge-teal';
    return `<tr>
      <td><strong>${u.name}</strong></td>
      <td style="color:var(--muted)">${u.username}</td>
      <td><span class="badge ${roleColor}">${u.role.toUpperCase()}</span></td>
      <td><span class="badge ${u.active?'badge-green':'badge-red'}">${u.active?'Aktif':'Nonaktif'}</span></td>
      <td>
        <div class="flex gap-8">
          <button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">Edit</button>
          ${u.id!==currentUser.id ? `<button class="btn btn-sm ${u.active?'btn-danger':'btn-success'}" onclick="toggleUserActive('${u.id}')">${u.active?'Nonaktifkan':'Aktifkan'}</button>` : '<span class="text-muted">—</span>'}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderAccessMatrix() {
  const pages = Object.keys(PAGE_LABELS);
  ['admin','panitia','user'].forEach(role => {
    const el = document.getElementById('access-'+role+'-list');
    if(!el) return;
    el.innerHTML = pages.map(p => {
      const has = ACCESS_MATRIX[role][p];
      return `<div class="access-row">
        <span style="font-size:13px">${PAGE_LABELS[p]}</span>
        <label class="access-toggle" title="${role==='admin'?'Admin selalu memiliki akses penuh':'Klik untuk toggle (simulasi)'}">
          <input type="checkbox" ${has?'checked':''} ${role==='admin'?'disabled':''} onchange="toggleAccess('${role}','${p}',this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>`;
    }).join('');
  });
}

function toggleAccess(role, page, val) {
  if(role==='admin') return; // admin always full
  ACCESS_MATRIX[role][page] = val;
  toast(`Akses "${PAGE_LABELS[page]}" untuk ${role} di${val?'aktifkan':'nonaktifkan'}.`);
  // Re-render nav if current user affected
  if(currentUser.role===role) {
    document.querySelectorAll('.nav-tab').forEach(tab=>{
      const p=tab.getAttribute('onclick')?.match(/showPage\('(\w+)'/)?.[1];
      if(p) tab.style.display=ACCESS_MATRIX[role][p]?'':'none';
    });
  }
}

function showAddUser() {
  editingUserId = null;
  document.getElementById('uform-title').textContent = 'Tambah Pengguna';
  ['uf-name','uf-uname','uf-pass','uf-prodi','uf-nim'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('uf-role').value='user';
  document.getElementById('user-form-card').style.display='block';
}

function editUser(id) {
  const u = USERS.find(u=>u.id===id);
  if(!u) return;
  editingUserId = id;
  document.getElementById('uform-title').textContent = 'Edit Pengguna';
  document.getElementById('uf-name').value  = u.name;
  document.getElementById('uf-uname').value = u.username;
  document.getElementById('uf-pass').value  = u.password;
  document.getElementById('uf-role').value  = u.role;
  document.getElementById('uf-prodi').value = u.prodi||'';
  document.getElementById('uf-nim').value   = u.nim||'';
  document.getElementById('user-form-card').style.display='block';
}

function cancelUserForm() {
  editingUserId=null;
  document.getElementById('user-form-card').style.display='none';
}

function saveUser() {
  const name  = document.getElementById('uf-name').value.trim();
  const uname = document.getElementById('uf-uname').value.trim();
  const pass  = document.getElementById('uf-pass').value.trim();
  const role  = document.getElementById('uf-role').value;
  const prodi = document.getElementById('uf-prodi').value.trim();
  const nim   = document.getElementById('uf-nim').value.trim();
  if(!name||!uname||!pass) return toast('Lengkapi nama, username, dan password!');

  if(editingUserId) {
    const idx = USERS.findIndex(u=>u.id===editingUserId);
    USERS[idx] = {...USERS[idx], name, username:uname, password:pass, role, prodi, nim};
    toast('✓ Data pengguna diperbarui!');
  } else {
    if(USERS.find(u=>u.username===uname)) return toast('Username sudah digunakan!');
    USERS.push({ id:'U'+String(USERS.length+1).padStart(3,'0'), username:uname, password:pass, name, role, prodi, nim, email:'', active:true });
    toast('✓ Pengguna baru ditambahkan!');
  }
  cancelUserForm();
  renderUserTable();
}

function toggleUserActive(id) {
  const u = USERS.find(u=>u.id===id);
  if(!u) return;
  u.active = !u.active;
  renderUserTable();
  toast(`Akun ${u.name} ${u.active?'diaktifkan':'dinonaktifkan'}.`);
}

// ═══════════════════════════════════════════════════
//  PROFIL
// ═══════════════════════════════════════════════════

function loadProfile() {
  const u = currentUser;
  const isAdmin = u.role!=='user';
  const initials = u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  const av = document.getElementById('profil-avatar');
  av.textContent = initials;
  av.className = 'profile-avatar ' + (isAdmin?'admin':'user');

  document.getElementById('profil-name').textContent = u.name;
  document.getElementById('profil-nim').textContent  = u.nim || u.username;

  const rb = document.getElementById('profil-role-badge');
  rb.textContent = u.role==='admin'?'🛡️ Administrator':u.role==='panitia'?'📋 Panitia':'🎓 Mahasiswa';
  rb.className = 'profile-role-badge';
  rb.style.background = isAdmin?'rgba(245,185,32,.25)':'rgba(14,165,200,.2)';
  rb.style.color = isAdmin?'var(--gold)':'var(--teal)';

  document.getElementById('prof-name').value  = u.name;
  document.getElementById('prof-uname').value = u.username;
  document.getElementById('prof-prodi').value = u.prodi||'';
  document.getElementById('prof-email').value = u.email||'';
}

function saveProfile() {
  const idx = USERS.findIndex(u=>u.id===currentUser.id);
  USERS[idx].name  = document.getElementById('prof-name').value.trim();
  USERS[idx].prodi = document.getElementById('prof-prodi').value.trim();
  USERS[idx].email = document.getElementById('prof-email').value.trim();
  currentUser = USERS[idx];
  document.getElementById('nav-username').textContent = currentUser.name.split(' ')[0];
  loadProfile();
  toast('✓ Profil berhasil disimpan!');
}

function changePassword() {
  const oldP = document.getElementById('prof-old-pass').value;
  const newP = document.getElementById('prof-new-pass').value;
  if(oldP !== currentUser.password) return toast('Password lama tidak sesuai!');
  if(newP.length < 6) return toast('Password baru minimal 6 karakter!');
  const idx = USERS.findIndex(u=>u.id===currentUser.id);
  USERS[idx].password = newP;
  currentUser.password = newP;
  document.getElementById('prof-old-pass').value='';
  document.getElementById('prof-new-pass').value='';
  toast('✓ Password berhasil diubah!');
}

function renderMyRegistrations() {
  const u = currentUser;
  const myRegs = registrations.filter(r=>r.nim===u.nim||r.name===u.name);
  const tbody = document.getElementById('my-reg-body');
  if(!tbody) return;
  tbody.innerHTML = myRegs.map(r=>{
    const ev = EVENTS.find(e=>e.id===r.event);
    const hadir = absensiLog.some(a=>a.regId===r.id);
    const cert  = certLog.some(c=>c.name===r.name&&c.event===(ev?ev.name:''));
    return `<tr>
      <td>${ev?ev.name:r.event}</td>
      <td style="color:var(--muted);font-size:12px">${r.date}</td>
      <td><span class="badge ${hadir?'badge-green':'badge-gold'}">${hadir?'✓ Hadir':'Belum'}</span></td>
      <td><span class="badge ${cert?'badge-gold':'badge-teal'}">${cert?'✓ Terbit':'—'}</span></td>
    </tr>`;
  }).join('')||'<tr><td colspan="4" class="text-center" style="color:var(--muted);padding:16px">Belum ada pendaftaran</td></tr>';
}

function nowStr() { const d=new Date(); return d.toISOString().slice(0,10)+' '+d.toTimeString().slice(0,5); }
function fmtDate(d) { const m=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des']; const [y,mo,dd]=d.split('-'); return parseInt(dd)+' '+m[parseInt(mo)-1]+' '+y; }

}

const GV = {
  mode: null, camReady: false, playing: false,
  players: [], hands: null, camera: null, camStarted: false,
  PINCH: 60,
  CONN: [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
         [9,13],[13,14],[14,15],[15,16],[13,17],[0,17],[17,18],[18,19],[19,20]],
  C1: '#00FFFF', C2: '#FF00FF',
};

function initGamePage() {
  document.getElementById('gm-single').classList.remove('sel');
  document.getElementById('gm-multi').classList.remove('sel');
  GV.mode = null;
  const cb = document.getElementById('btn-gm-cam');
  if(cb) { cb.textContent='NYALAKAN KAMERA'; cb.className='btn-game-cam'; cb.disabled=false; }
  const sb = document.getElementById('btn-gm-start');
  if(sb) sb.disabled = true;
}

function selectGameMode(mode) {
  GV.mode = mode;
  document.getElementById('gm-single').classList.toggle('sel', mode==='single');
  document.getElementById('gm-multi').classList.toggle('sel', mode==='multi');
  const sb = document.getElementById('btn-gm-start');
  if(sb) sb.disabled = !(GV.camReady && GV.mode);
}

function startGameCam() {
  const isSecure = location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1';
  if(!isSecure) { toast('\u26a0\ufe0f Kamera butuh HTTPS!'); return; }
  const btn = document.getElementById('btn-gm-cam');
  btn.textContent='MEMUAT KAMERA...'; btn.disabled=true;
  navigator.mediaDevices.getUserMedia({video:true})
    .then(stream => {
      stream.getTracks().forEach(t=>t.stop());
      GV.camReady = true;
      btn.textContent='KAMERA AKTIF \u2713'; btn.className='btn-game-cam cam-on';
      const sb = document.getElementById('btn-gm-start');
      if(sb && GV.mode) sb.disabled=false;
      toast('\u2705 Kamera siap!');
    })
    .catch(() => {
      btn.textContent='NYALAKAN KAMERA'; btn.disabled=false;
      toast('\u26a0\ufe0f Akses kamera ditolak.');
    });
}

function launchGame() {
  if(!GV.camReady || !GV.mode) { toast('Pilih mode dan aktifkan kamera dulu!'); return; }
  document.getElementById('game-overlay').classList.add('open');
  document.getElementById('ai-chat-btn').style.display='none';
  document.getElementById('ai-chat-popup').classList.remove('open');
  const badge = document.getElementById('gv-mode-badge');
  const isMulti = GV.mode==='multi';
  badge.textContent = isMulti ? 'MODE: MULTIPLAYER' : 'MODE: SINGLE PLAYER';
  badge.style.borderColor = isMulti ? GV.C2 : GV.C1;
  badge.style.color = isMulti ? GV.C2 : GV.C1;
  badge.style.background = isMulti ? 'rgba(255,0,255,.08)' : 'rgba(0,255,255,.08)';
  document.getElementById('game-mode-label').textContent = isMulti ? 'MULTIPLAYER' : 'SINGLE PLAYER';
  const wrap = document.getElementById('game-frame-wrap');

  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;

}

function gvInitMediaPipe() {
  if(typeof Hands === 'undefined' || typeof Camera === 'undefined') {
    toast('\u26a0\ufe0f MediaPipe belum dimuat. Coba refresh halaman.'); return;
  }
  const video  = document.getElementById('gv-webcam');
  const canvas = document.getElementById('gv-canvas');
  const ctx    = canvas.getContext('2d', {willReadFrequently:true});
  GV.ctx = ctx;
  GV.hands = new Hands({ locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f });
  GV.hands.setOptions({ maxNumHands:4, modelComplexity:1, minDetectionConfidence:.7, minTrackingConfidence:.7 });
  GV.hands.onResults(r => gvOnResults(r, canvas, ctx));
  GV.camera = new Camera(video, {
    onFrame: async () => { if(GV.hands) await GV.hands.send({image: video}); },
    width:1280, height:720
  });
  GV.camera.start().then(() => {
    const cb = document.getElementById('gv-btn-cam');
    cb.textContent='KAMERA AKTIF \u2713';
    cb.style.cssText='font-family:Orbitron,sans-serif;font-weight:800;font-size:14px;padding:12px 24px;border-radius:999px;border:2px solid #00FFFF;cursor:default;background:transparent;color:#00FFFF;width:100%;box-shadow:0 0 14px rgba(0,255,255,.4);transition:all .2s';
    cb.disabled=true;
    const sb=document.getElementById('gv-btn-start');
    sb.disabled=false;
    sb.style.cssText='font-family:Orbitron,sans-serif;font-weight:800;font-size:14px;padding:12px 24px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,#00FFFF,#FF00FF);color:#000;width:100%;box-shadow:0 0 20px rgba(150,0,255,.5);transition:all .2s';
    GV.camStarted=true;
  }).catch(e => { toast('\u26a0\ufe0f Gagal mengakses kamera: '+e.message); });
}

function gvStartCam() {
  const btn = document.getElementById('gv-btn-cam');
  btn.textContent='MEMUAT...'; btn.disabled=true;
  if(!GV.hands) gvInitMediaPipe();
}

function gvStartGame() {
  if(!GV.camStarted) return;
  document.getElementById('gv-ui').style.display='none';
  const canvas=document.getElementById('gv-canvas');
  GV.playing=true; GV.players=[];
  if(GV.mode==='single') {
    GV.players.push(new GVPlayer(1,{x:0,y:0,w:canvas.width,h:canvas.height},GV.C1));
  } else {
    let hw=canvas.width/2;
    GV.players.push(new GVPlayer(1,{x:0,y:0,w:hw,h:canvas.height},GV.C1));
    GV.players.push(new GVPlayer(2,{x:hw,y:0,w:hw,h:canvas.height},GV.C2));
  }
}

function gvPlayAgain() {
  document.getElementById('gv-win').style.display='none';
  document.getElementById('gv-ui').style.display='flex';
  GV.playing=false; GV.players=[];
}

function closeGame() {

  if(GV.camera) { try{ GV.camera.stop(); }catch(_){} GV.camera=null; GV.hands=null; GV.camStarted=false; }
  GV.playing=false; GV.players=[];
  document.getElementById('gv-ui').style.display='flex';
  document.getElementById('gv-win').style.display='none';
  const cb=document.getElementById('gv-btn-cam');
  cb.textContent='NYALAKAN KAMERA'; cb.disabled=false;
  cb.style.cssText='font-family:Orbitron,sans-serif;font-weight:800;font-size:14px;padding:12px 24px;border-radius:999px;border:none;cursor:pointer;background:#fff;color:#000;width:100%;box-shadow:0 0 20px rgba(255,255,255,.5);transition:all .2s';
  const sb=document.getElementById('gv-btn-start');
  sb.disabled=true;
  sb.style.cssText='font-family:Orbitron,sans-serif;font-weight:800;font-size:14px;padding:12px 24px;border-radius:999px;border:none;cursor:not-allowed;background:rgba(255,255,255,.07);color:rgba(255,255,255,.25);width:100%;transition:all .2s';
  document.getElementById('ai-chat-btn').style.display='';
  toast('\U0001f3ae Game ditutup.');

function gvOnResults(results, canvas, ctx) {
  const wrap=document.getElementById('game-frame-wrap');
  if(canvas.width!==wrap.clientWidth||canvas.height!==wrap.clientHeight){ canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight; }
  ctx.save(); ctx.clearRect(0,0,canvas.width,canvas.height);
  const cr=canvas.width/canvas.height, vr=results.image.width/results.image.height;
  let dw,dh,dx,dy;
  if(cr>vr){dw=canvas.width;dh=dw/vr;dx=0;dy=(canvas.height-dh)/2;}
  else{dh=canvas.height;dw=dh*vr;dy=0;dx=(canvas.width-dw)/2;}
  ctx.translate(canvas.width,0); ctx.scale(-1,1);
  ctx.filter='brightness(0.45)'; ctx.drawImage(results.image,dx,dy,dw,dh);
  ctx.filter='none'; ctx.restore();
  let mappedHands=[];
  if(results.multiHandLandmarks){
    for(const lm of results.multiHandLandmarks){
      let m=lm.map(p=>{ let x=p.x*dw+dx; let y=p.y*dh+dy; x=canvas.width-x; return{x,y,z:p.z}; });
      mappedHands.push(m);
    }
  }
  if(GV.playing && GV.players.length>0){
    if(GV.mode==='multi'){
      ctx.save(); ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.shadowColor='white'; ctx.shadowBlur=8; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke(); ctx.restore();
    }
    let p1h=[], p2h=[];
    if(GV.mode==='single') p1h=mappedHands;
    else mappedHands.forEach(h=>{ let ax=h.reduce((s,l)=>s+l.x,0)/h.length; if(ax<canvas.width/2) p1h.push(h); else p2h.push(h); });
    if(GV.players[0]) GV.players[0].update(p1h, canvas, ctx);
    if(GV.players[1]) GV.players[1].update(p2h, canvas, ctx);
    if(GV.mode==='multi'){
      if(GV.players.every(p=>p.state!=='CALIBRATING'))
        GV.players.forEach(p=>{ if(p.state==='WAITING') p.startPlaying(); });
    }
    if(GV.mode==='single') mappedHands.forEach(h=>gvSkeleton(h,GV.C1,ctx));
    else mappedHands.forEach(h=>{ let ax=h.reduce((s,l)=>s+l.x,0)/h.length; gvSkeleton(h,ax<canvas.width/2?GV.C1:GV.C2,ctx); });
  } else {
    mappedHands.forEach(h=>gvSkeleton(h,'#fff',ctx));
  }
}

function gvSkeleton(lm,color,ctx){
  ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=10; ctx.lineWidth=2.5;
  GV.CONN.forEach(c=>{ ctx.beginPath(); ctx.moveTo(lm[c[0]].x,lm[c[0]].y); ctx.lineTo(lm[c[1]].x,lm[c[1]].y); ctx.stroke(); });
  lm.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); });
  ctx.restore();
}

function gvDist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

class GVPlayer {
  constructor(id,bounds,color){
    this.id=id; this.bounds=bounds; this.color=color;
    this.state='CALIBRATING'; this.box=null; this.pieces=[]; this.slots=[];
    this.held=-1; this.t0=null; this.elapsed=0; this.timer=null; this.pinching=false;
  }
  update(hands,canvas,ctx){
    if(this.state==='CALIBRATING') this.calibrate(hands,canvas,ctx);
    else if(this.state==='WAITING') this.drawWait(ctx,false);
    else if(this.state==='PLAYING') this.gameplay(hands,canvas,ctx);
    else if(this.state==='LOSE')    this.drawWait(ctx,true);
  }
  calibrate(hands,canvas,ctx){
    ctx.save();
    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=10;
    ctx.font='bold '+Math.min(22,canvas.width*.028)+'px Orbitron,sans-serif'; ctx.textAlign='center';
    let mx=this.bounds.x+this.bounds.w/2;
    ctx.fillText('P'+this.id+': Angkat 2 Tangan',mx,50);
    ctx.font=Math.min(15,canvas.width*.02)+'px Segoe UI,sans-serif'; ctx.shadowBlur=4;
    ctx.fillText('Bentangkan jempol & telunjuk, lalu jentikkan!',mx,76);
    ctx.restore();
    if(hands.length<2) return;
    let hA=hands[0], hB=hands[1];
    let lh=hA[0].x<hB[0].x?hA:hB, rh=hA[0].x<hB[0].x?hB:hA;
    let pLT=lh[4], pRI=rh[8];
    let l=Math.min(pLT.x,pRI.x), r=Math.max(pLT.x,pRI.x);
    let t=Math.min(pLT.y,pRI.y), b=Math.max(pLT.y,pRI.y);
    let w=r-l, h=b-t;
    if(w<50||h<50) return;
    this.box={x:l,y:t,w,h};
    ctx.save(); ctx.strokeStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=15; ctx.lineWidth=4;
    ctx.strokeRect(l,t,w,h); ctx.restore();
    let pL=gvDist(lh[4],lh[8])<GV.PINCH;
    let pR=gvDist(rh[4],rh[8])<GV.PINCH;
    [[pL,lh],[pR,rh]].filter(x=>x[0]).forEach(([,hand])=>{
      ctx.save(); ctx.strokeStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=18; ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(hand[4].x,hand[4].y); ctx.lineTo(hand[8].x,hand[8].y); ctx.stroke(); ctx.restore();
    });
    if(pL&&pR) this.capture(canvas,ctx);
  }
  capture(canvas,ctx){
    let img=ctx.getImageData(this.box.x,this.box.y,this.box.w,this.box.h);
    let tc=document.createElement('canvas'); tc.width=this.box.w; tc.height=this.box.h;
    tc.getContext('2d').putImageData(img,0,0);
    let pw=this.box.w/3, ph=this.box.h/3;
    this.pieces=[]; this.slots=[];
    for(let i=0;i<9;i++){
      let row=Math.floor(i/3), col=i%3;
      let px=this.box.x+col*pw, py=this.box.y+row*ph;
      this.slots.push({x:px,y:py,w:pw,h:ph});
      let pc=document.createElement('canvas'); pc.width=pw; pc.height=ph;
      pc.getContext('2d').drawImage(tc,col*pw,row*ph,pw,ph,0,0,pw,ph);
      this.pieces.push({id:i,slot:i,img:pc,dx:px,dy:py});
    }
    let si=[0,1,2,3,4,5,6,7,8];
    for(let i=si.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [si[i],si[j]]=[si[j],si[i]]; }
    this.pieces.forEach((p,idx)=>{ p.slot=si[idx]; this.snap(p); });
    if(GV.mode==='multi') this.state='WAITING'; else this.startPlaying();
  }
  snap(p){ let s=this.slots[p.slot]; p.dx=s.x; p.dy=s.y; }
  startPlaying(){ this.state='PLAYING'; this.t0=Date.now(); this.timer=setInterval(()=>{ this.elapsed=Math.floor((Date.now()-this.t0)/1000); },1000); }
  drawWait(ctx,lose){
    this.pieces.forEach(p=>{ ctx.drawImage(p.img,p.dx,p.dy); ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1; ctx.strokeRect(p.dx,p.dy,p.img.width,p.img.height); });
    if(!lose){ ctx.save(); ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=8; ctx.font="bold 20px Orbitron,sans-serif"; ctx.textAlign='center'; ctx.fillText('Menunggu lawan...',this.bounds.x+this.bounds.w/2,48); ctx.restore(); }
  }
  gameplay(hands,canvas,ctx){
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1;
    this.slots.forEach(s=>ctx.strokeRect(s.x,s.y,s.w,s.h)); ctx.restore();
    let cursor=null, pin=false;
    if(hands.length>0){
      let h=hands[0]; cursor={x:(h[4].x+h[8].x)/2,y:(h[4].y+h[8].y)/2}; pin=gvDist(h[4],h[8])<GV.PINCH;
      ctx.save();
      let pulse=pin?Math.abs(Math.sin(Date.now()/120))*6:0; let r=pin?12+pulse:7;
      ctx.fillStyle=pin?this.color:'rgba(255,255,255,.85)'; ctx.shadowColor=pin?this.color:'white'; ctx.shadowBlur=pin?18+pulse*2:8;
      if(pin){ ctx.strokeStyle=this.color; ctx.lineWidth=3+pulse/2; ctx.beginPath(); ctx.moveTo(h[4].x,h[4].y); ctx.lineTo(h[8].x,h[8].y); ctx.stroke(); ctx.beginPath(); ctx.arc(cursor.x,cursor.y,r+10,0,Math.PI*2); ctx.lineWidth=2; ctx.stroke(); }
      ctx.beginPath(); ctx.arc(cursor.x,cursor.y,r,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    if(pin&&!this.pinching){ this.pinching=true; if(cursor&&this.held===-1){ for(let i=0;i<this.pieces.length;i++){ let p=this.pieces[i]; let s=this.slots[p.slot]; if(cursor.x>=s.x&&cursor.x<=s.x+s.w&&cursor.y>=s.y&&cursor.y<=s.y+s.h){ this.held=i; break; } } } }
    else if(pin&&this.pinching){ if(this.held!==-1&&cursor){ let p=this.pieces[this.held]; p.dx=cursor.x-this.slots[0].w/2; p.dy=cursor.y-this.slots[0].h/2; } }
    else if(!pin&&this.pinching){ this.pinching=false; if(this.held!==-1&&cursor){ let hp=this.pieces[this.held]; let ti=-1; let md=Infinity; for(let i=0;i<this.slots.length;i++){ let s=this.slots[i]; let d=gvDist(cursor,{x:s.x+s.w/2,y:s.y+s.h/2}); if(d<md){md=d;ti=i;} } if(ti!==-1&&ti!==hp.slot){ let pit=this.pieces.find(p=>p.slot===ti); if(pit){ pit.slot=hp.slot; this.snap(pit); } hp.slot=ti; } this.snap(hp); this.held=-1; this.checkWin(); } }
    this.pieces.forEach((p,i)=>{ if(i!==this.held){ ctx.drawImage(p.img,p.dx,p.dy); ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5; ctx.strokeRect(p.dx,p.dy,p.img.width,p.img.height); } });
    if(this.held!==-1){ let p=this.pieces[this.held]; ctx.globalAlpha=.82; ctx.drawImage(p.img,p.dx,p.dy); ctx.globalAlpha=1; ctx.save(); let pg=Math.abs(Math.sin(Date.now()/150))*14; ctx.strokeStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=14+pg; ctx.lineWidth=3+pg/5; ctx.strokeRect(p.dx,p.dy,p.img.width,p.img.height); ctx.restore(); }
    ctx.save(); ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=12; ctx.font='bold '+Math.min(28,canvas.width*.032)+'px Orbitron,sans-serif'; ctx.textAlign='center'; ctx.fillText('WAKTU: '+this.fmt(this.elapsed),this.bounds.x+this.bounds.w/2,46); ctx.restore();
  }
  checkWin(){
    if(!this.pieces.every(p=>p.id===p.slot)||this.state==='SOLVED') return;
    this.state='SOLVED'; clearInterval(this.timer);
    if(GV.mode==='multi'){ let loser=GV.players.find(x=>x.id!==this.id); if(loser){ loser.state='LOSE'; clearInterval(loser.timer); } }
    let tc=document.createElement('canvas'); tc.width=this.box.w; tc.height=this.box.h;
    let tctx=tc.getContext('2d'); this.pieces.forEach(p=>tctx.drawImage(p.img,p.dx-this.box.x,p.dy-this.box.y));
    const winDiv=document.getElementById('gv-win'), wt=document.getElementById('gv-win-title'), wc=document.getElementById('gv-win-card');
    document.getElementById('gv-win-img').src=tc.toDataURL();
    document.getElementById('gv-win-time').textContent='WAKTU: '+this.fmt(this.elapsed);
    if(GV.mode==='multi'){ wt.textContent='PLAYER '+this.id+' MENANG! \U0001f3c6'; wt.style.color=this.color; wt.style.textShadow='0 0 20px '+this.color; wc.style.borderColor=this.color; wc.style.boxShadow='0 0 36px '+this.color+'55'; }
    else { wt.textContent='SELESAI! \U0001f389'; wt.style.color=GV.C1; wt.style.textShadow='0 0 20px '+GV.C1; wc.style.borderColor=GV.C1; wc.style.boxShadow='0 0 36px '+GV.C1+'55'; }
    GV.playing=false; winDiv.style.display='flex';
  }
  fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function renderTiketify() { filterTiketify(); }

function filterTiketify() {
  const q    = (document.getElementById('tkt-search')||{}).value?.toLowerCase()||'';
  const city = (document.getElementById('tkt-city')||{}).value||'';
  const data = TKT_EVENTS.filter(e =>
    (!q || e.name.toLowerCase().includes(q) || e.cat.toLowerCase().includes(q) || e.city.toLowerCase().includes(q)) &&
    (!city || e.city === city) &&
    (!tktCatFilter || e.cat === tktCatFilter)
  );
  const grid = document.getElementById('tkt-grid');
  if(!grid) return;
  grid.innerHTML = data.map(e => {
    const isFree = e.price === 0;
    const low = e.avail < 100;
    return `<div class="tkt-card" onclick="openCheckout('${e.id}')">
      <div class="tkt-card-img" style="background:${e.color}">
        <div style="position:absolute;top:12px;right:12px;font-size:36px">${e.emoji}</div>
        <span class="tkt-card-cat">${e.cat}</span>
      </div>
      <div class="tkt-card-body">
        <div class="tkt-card-title">${e.name}</div>
        <div class="tkt-card-meta">
          <span>📅 ${fmtDate(e.date)}</span>
          <span>📍 ${e.city}</span>
          <span>🏟 ${e.venue}</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px">oleh ${e.organizer}</div>
        <div class="tkt-card-footer">

            <div class="tkt-avail ${low?'':''}">

// ── CHECKOUT ──
function openCheckout(id) {
  ckEvent = TKT_EVENTS.find(e=>e.id===id);
  if(!ckEvent) return;
  ckQty = 1; ckPayMethod = 'cc'; ckBankChoice = '';
  document.getElementById('ck-modal-title').textContent = 'Beli Tiket — '+ckEvent.name;
  updateCkSummary();

  // Pre-fill from logged in user
  const u = currentUser;
  if(u) {
    document.getElementById('ck-name').value  = u.name||'';
    document.getElementById('ck-email').value = u.email||'';
  }

  // Build event info
  const isFree = ckEvent.price===0;
  document.getElementById('ck-event-info').innerHTML = `
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:56px;height:56px;border-radius:10px;background:${ckEvent.color};display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${ckEvent.emoji}</div>
      <div>
        <div style="font-weight:700;font-size:15px;margin-bottom:4px">${ckEvent.name}</div>
        <div style="font-size:12px;color:var(--muted)">📅 ${fmtDate(ckEvent.date)} &nbsp;·&nbsp; 📍 ${ckEvent.venue}</div>
        <div style="font-size:12px;color:var(--muted)">oleh ${ckEvent.organizer}</div>
      </div>
    </div>`;
  document.getElementById('ck-avail-lbl').textContent = 'Tersedia: '+ckEvent.avail;

  // reset steps
  ckGoStep(1);
  document.getElementById('checkout-modal').classList.add('open');
  generateQR('qr-payment'); generateQR('qr-ticket');
}

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
}

function changeQty(delta) {
  ckQty = Math.max(1, Math.min(ckEvent.avail, ckQty + delta));
  document.getElementById('ck-qty').textContent = ckQty;
  updateCkSummary();
}

function updateCkSummary() {
  if(!ckEvent) return;
  const sub  = ckEvent.price * ckQty;
  const fee  = Math.round(sub * 0.02);
  const total= sub + fee;
  const fmt  = n => n===0 ? 'Gratis' : 'Rp '+n.toLocaleString('id-ID');
  document.getElementById('ck-subtotal').textContent = fmt(sub);
  document.getElementById('ck-fee').textContent      = fmt(fee);
  document.getElementById('ck-total').textContent    = fmt(total);
}

function ckGoStep(n) {
  [1,2,3,4].forEach(i => {
    document.getElementById('ck-p'+i).style.display = i===n ? '' : 'none';
    const num = document.getElementById('ck-n'+i);
    if(i<n)      { num.className='ck-step-num done'; num.textContent='✓'; document.getElementById('ck-l'+i).className='ck-step-lbl'; }
    else if(i===n){ num.className='ck-step-num active'; num.textContent=i;  document.getElementById('ck-l'+i).className='ck-step-lbl active'; }
    else          { num.className='ck-step-num'; num.textContent=i;          document.getElementById('ck-l'+i).className='ck-step-lbl'; }
    if(i<4) document.getElementById('ck-line'+i).className='ck-line'+(i<n?' done':'');
  });
}

function ckStep2() {
  const name = document.getElementById('ck-name').value.trim();
  const email= document.getElementById('ck-email').value.trim();
  const wa   = document.getElementById('ck-wa').value.trim();
  const err  = document.getElementById('ck-err2');
  const msg  = document.getElementById('ck-err2-msg');
  if(!name)  { msg.textContent='Nama lengkap wajib diisi.'; err.style.display='flex'; return; }
  if(!email || !/\S+@\S+\.\S+/.test(email)) { msg.textContent='Email tidak valid.'; err.style.display='flex'; return; }
  if(!wa)    { msg.textContent='No. WhatsApp wajib diisi.'; err.style.display='flex'; return; }
  err.style.display='none';
  ckGoStep(3);
}

function selectPay(method) {
  ckPayMethod = method;
  ['cc','paypal','bank','ewallet'].forEach(m => {
    document.getElementById('pay-'+m).classList.toggle('active', m===method);
    document.getElementById('pay-form-'+m).style.display = m===method ? '' : 'none';
  });

}

function selectBank(el, info) {
  document.querySelectorAll('#ck-p3 .pay-grid .pay-option').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  ckBankChoice = info;
  const bi = document.getElementById('bank-info');
  bi.style.display='flex';
  document.getElementById('bank-num').textContent = info;
}

function fmtCard(input) {
  let v = input.value.replace(/\D/g,'').slice(0,16);
  input.value = v.replace(/(.{4})/g,'$1 ').trim();
}

function ckStep3() {
  const err = document.getElementById('ck-err3');
  const msg = document.getElementById('ck-err3-msg');
  if(ckPayMethod==='cc') {
    const num = document.getElementById('ck-cc-num').value.replace(/\s/g,'');
    const exp = document.getElementById('ck-cc-exp').value;
    const cvv = document.getElementById('ck-cc-cvv').value;
    if(num.length<16) { msg.textContent='Nomor kartu tidak valid.'; err.style.display='flex'; return; }
    if(!exp.match(/\d{2}\/\d{2}/)) { msg.textContent='Format tanggal kadaluarsa MM/YY.'; err.style.display='flex'; return; }
    if(cvv.length<3)  { msg.textContent='CVV tidak valid.'; err.style.display='flex'; return; }
  }
  if(ckPayMethod==='bank' && !ckBankChoice) { msg.textContent='Pilih bank tujuan terlebih dahulu.'; err.style.display='flex'; return; }
  err.style.display='none';

  // Process payment (simulated)
  const code = 'TKT-'+Math.random().toString(36).slice(2,8).toUpperCase();
  const sub  = ckEvent.price * ckQty;
  const fee  = Math.round(sub*0.02);
  ticketsPurchased.push({ code, event:ckEvent.name, qty:ckQty, total:sub+fee, date:today(), buyer:document.getElementById('ck-name').value });

  document.getElementById('ck-receipt').innerHTML = `
    <div style="display:grid;gap:6px;font-size:13px">
      <div class="flex justify-between"><span style="color:var(--muted)">Kode Tiket</span> <strong style="color:var(--accent)">${code}</strong></div>
      <div class="flex justify-between"><span style="color:var(--muted)">Event</span> <span style="text-align:right;max-width:60%">${ckEvent.name}</span></div>
      <div class="flex justify-between"><span style="color:var(--muted)">Tanggal</span> <span>${fmtDate(ckEvent.date)}</span></div>
      <div class="flex justify-between"><span style="color:var(--muted)">Jumlah</span> <span>${ckQty} tiket</span></div>
      <div class="flex justify-between"><span style="color:var(--muted)">Total Bayar</span> <strong>${sub+fee===0?'Gratis':'Rp '+(sub+fee).toLocaleString('id-ID')}</strong></div>
      <div class="flex justify-between"><span style="color:var(--muted)">Metode</span> <span>${{cc:'Kartu Kredit',paypal:'PayPal',bank:'Transfer Bank — '+ckBankChoice,ewallet:'E-Wallet / QRIS'}[ckPayMethod]}</span></div>
    </div>`;

  generateQR('qr-ticket');
  ckGoStep(4);
  toast('🎉 Tiket berhasil dibeli! Cek email Anda.');
}

function downloadTicket() {
  toast('⬇ Mengunduh tiket PDF...');
}

function generateQR(elId) {
  const el = document.getElementById(elId);
  if(!el) return;
  el.innerHTML = '';
  for(let i=0;i<49;i++){
    const c=document.createElement('div'); c.className='tkt-qr-cell';
    const dark=(i<7&&(i%7===0||i%7===6))||Math.random()>.5;
    c.style.background=dark?'#1A1A2E':'#fff';
    el.appendChild(c);
  }
}

function addChatMsg(role, text) {
  const msgs = document.getElementById('chat-messages');
  const time  = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const initials = currentUser ? currentUser.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : 'U';
  const rendered = text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="msg-avatar">${role==='ai'?'🤖':initials}</div>
    <div class="msg-wrap">
      <div class="msg-bubble">${rendered}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if(role !== 'typing') {
    chatHistory.push({ role: role==='ai'?'assistant':'user', content: text });
  }
}

async function sendChat() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('chat-sugg').style.display = 'none';
  document.getElementById('chat-send').disabled = true;

  addChatMsg('user', text);
  showTyping();

  // Try Anthropic API (works in Claude artifacts — no CORS)
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '',   // handled by artifact proxy
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 400,
        system: SYSTEM_PROMPT,
        messages: chatHistory
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .slice(-10)
          .map(m => ({ role: m.role, content: m.content }))
      })
    });

    if(res.ok) {
      const data = await res.json();
      removeTyping();
      const reply = data?.content?.[0]?.text;
      if(reply) { addChatMsg('ai', reply.trim()); return; }
    }
  } catch(_) {}

  // Smart offline fallback — always works
  await new Promise(r => setTimeout(r, 900 + Math.random()*600));
  removeTyping();
  addChatMsg('ai', getFallbackReply(text));
  document.getElementById('chat-send').disabled = false;
}

function sendSugg(el) {
  document.getElementById('chat-input').value = el.textContent;
  document.getElementById('chat-input').focus();
  sendChat();
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('l-user').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// init signup role
signupSelectRole('user');
signupSelectRole('user');
</script>
</body>
